version: "3.8"
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.5
    container_name: keycloak26-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak-themes:/opt/keycloak/themes
    command: start-dev
